<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Chat App</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js"></script>
  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; padding:0;}
    #chat { max-width: 600px; margin: auto; padding: 20px; }
    .message { padding: 10px; margin:5px 0; border-radius:10px; display: inline-block; }
    .me { background: #DCF8C6; float:right; clear:both;}
    .other { background: #FFF; float:left; clear:both;}
    #messages { min-height: 400px; border:1px solid #ccc; padding:10px; overflow-y: scroll; background:#fff;}
    #inputArea { margin-top:10px; display:flex; }
    #inputArea input { flex:1; padding:10px; border-radius:5px; border:1px solid #ccc; }
    #inputArea button { padding:10px 15px; margin-left:5px; border:none; background:green; color:white; border-radius:5px; }
  </style>
</head>
<body>

<div id="chat">
  <h2>Web Chat App</h2>
  <div id="messages"></div>
  <div id="inputArea">
    <input type="text" id="messageInput" placeholder="Mesaj yaz..." />
    <button onclick="sendMessage()">Gönder</button>
    <input type="file" id="fileInput" />
  </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  const userId = prompt("Kullanıcı adını girin:");

  // Online durumu
  const userRef = db.collection("users").doc(userId);
  userRef.set({online:true});
  window.addEventListener("beforeunload", () => {
    userRef.update({online:false});
  });

  // Mesaj gönderme
  async function sendMessage() {
    const input = document.getElementById("messageInput");
    if(input.value.trim() === "") return;
    await db.collection("messages").add({
      text: input.value,
      sender: userId,
      time: firebase.firestore.FieldValue.serverTimestamp(),
      seen: false,
      type: "text"
    });
    input.value = "";
  }

  // Dosya gönderme
  const fileInput = document.getElementById("fileInput");
  fileInput.addEventListener("change", async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const ref = storage.ref('files/'+Date.now()+"_"+file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    const type = file.type.startsWith("image") ? "image" : "video";
    await db.collection("messages").add({
      fileUrl: url,
      sender: userId,
      time: firebase.firestore.FieldValue.serverTimestamp(),
      type: type,
      seen: false
    });
    fileInput.value = "";
  });

  // Mesajları gösterme ve okundu işareti
  db.collection("messages").orderBy("time")
    .onSnapshot(snapshot=>{
      const messagesDiv = document.getElementById("messages");
      messagesDiv.innerHTML = "";
      snapshot.forEach(doc=>{
        const m = doc.data();
        const div = document.createElement("div");
        div.className = "message " + (m.sender === userId ? "me" : "other");
        if(m.type === "text") div.textContent = m.text;
        if(m.type === "image") div.innerHTML = `<img src="${m.fileUrl}" width="200"/>`;
        if(m.type === "video") div.innerHTML = `<video width="200" controls><source src="${m.fileUrl}"></video>`;
        // okundu işareti
        if(m.sender === userId) div.innerHTML += m.seen ? " ✔✔" : " ✔";
        messagesDiv.appendChild(div);

        // Eğer ben alıcıysam seen=true yap
        if(m.sender !== userId && !m.seen) {
          doc.ref.update({seen:true});
        }
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
</script>

</body>
</html>
